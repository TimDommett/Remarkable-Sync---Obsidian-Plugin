name: Release plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write # Needed to create the GitHub release
  id-token: write # Needed to mint the OIDC token for Sigstore
  attestations: write # Needed to publish the build provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Stage release assets
        run: |
          cp release/remarkable-sync/main.js main.js
          cp release/remarkable-sync/manifest.json manifest.json
          cp release/remarkable-sync/styles.css styles.css

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            main.js
            manifest.json
            styles.css
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
