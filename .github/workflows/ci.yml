name: CI

# Runs on commits pushed to branches in THIS repository, plus manual dispatch.
#
# There is intentionally no `pull_request` trigger: a pull request opened from a
# fork would run against — and bill — this repository's Actions minutes. With a
# push-only trigger, CI runs on the maintainer's commits (and any branch pushed
# directly to this repo), while an outside contributor's fork PR does not consume
# the maintainer's minutes. (Public repositories don't incur Actions charges, but
# this keeps billing safe if the repo is ever made private.)
on:
  push:
  workflow_dispatch:

# Cancel superseded runs on the same ref to avoid wasting Actions minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (Obsidian guidelines)
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit
